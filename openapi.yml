openapi: 3.1.0
info:
  title: Fruit Store Benchmark API — OOTB
  description: >
    Canonical REST API contract for the OOTB (out-of-the-box) strategy of the
    framework performance benchmarking suite. All module implementations on the
    ootb branch MUST conform to this specification.

    Unlike the tuned strategy, entities are returned directly (no DTOs).
    StoreFruitPrice.id and StoreFruitPrice.fruit are excluded via @JsonIgnore.
  version: "1.0"

paths:
  /fruits:
    get:
      operationId: getAll
      summary: List all fruits
      responses:
        "200":
          description: All fruits with their store prices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fruit"

    post:
      operationId: addFruit
      summary: Create a new fruit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FruitCreate"
      responses:
        "200":
          description: The created fruit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fruit"

  /fruits/{name}:
    get:
      operationId: getFruit
      summary: Get a fruit by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The fruit was found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fruit"
        "404":
          description: No fruit with the given name exists

components:
  schemas:
    Fruit:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        description:
          type: string
        storePrices:
          type: array
          items:
            $ref: "#/components/schemas/StoreFruitPrice"

    FruitCreate:
      description: >
        Request body for creating a fruit. Only name and description are
        accepted — id and storePrices are managed by the server.
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    StoreFruitPrice:
      description: >
        A store's price for a fruit. The composite key (id) and back-reference
        to the fruit are excluded via @JsonIgnore on the entity.
      type: object
      required:
        - store
        - price
      properties:
        store:
          $ref: "#/components/schemas/Store"
        price:
          type: number
          minimum: 0

    Store:
      type: object
      required:
        - name
        - currency
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
        currency:
          type: string
          minLength: 1
        address:
          $ref: "#/components/schemas/Address"

    Address:
      type: object
      required:
        - address
        - city
        - country
      properties:
        address:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 1
